<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Arial", sans-serif;
}

body{
  height:100vh;
  overflow:hidden;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb);
}

/* BACKGROUND */
#stars,#hearts,#sakura{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* STARS */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  animation:twinkle 2s infinite;
}

@keyframes twinkle{
  0%{opacity:.2;transform:scale(1);}
  50%{opacity:1;transform:scale(1.5);}
  100%{opacity:.2;transform:scale(1);}
}

/* FLOAT HEART */
.heart{
  position:absolute;
  color:rgba(255,255,255,.7);
  animation:float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* SAKURA */
.sakura{
  position:absolute;
  width:10px;
  height:10px;
  background:pink;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-10%);}
  100%{transform:translateY(110vh);}
}

/* CARD */
.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(15px);
  color:white;
  text-align:center;
  box-shadow:0 10px 40px rgba(0,0,0,.2);
}

h1{
  font-size:30px;
}

p{
  font-size:14px;
  margin-top:10px;
}

/* ENVELOPE */
.envelope{
  width:120px;
  height:80px;
  margin:20px auto;
  background:#ff4d6d;
  position:relative;
  border-radius:10px;
  cursor:pointer;
}

.envelope:before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  border-left:60px solid transparent;
  border-right:60px solid transparent;
  border-top:40px solid #ff2e63;
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-weight:bold;
}

#musicBtn{
  background:white;
  color:#ff4d6d;
}

#loveBtn{
  background:white;
  color:#ff2e63;
}

/* LETTER */
#letter{
  display:none;
  margin-top:10px;
  text-align:left;
  font-size:13px;
  line-height:1.6;
  max-height:180px;
  overflow-y:auto;
}

/* HEART EXPLOSION */
.explode{
  position:absolute;
  color:red;
  animation:boom 1s ease-out forwards;
}

@keyframes boom{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(3) translateY(-200px);opacity:0;}
}
</style>
</head>

<body>

<div id="stars"></div>
<div id="hearts"></div>
<div id="sakura"></div>

<div class="card">
  <h1>Untuk Kamu ❤️</h1>
  <p>klik envelope nya ya...</p>

  <div class="envelope" onclick="openLetter()"></div>

  <div id="letter"></div>

  <button id="musicBtn" onclick="toggleMusic()">Play Music 🎵</button>
  <button id="loveBtn" onclick="love()">Maafin Aku? 🥺</button>
</div>

<audio id="music" loop>
  <source src="iloveyouso.mp3" type="audio/mpeg">
</audio>

<script>

/* LETTER TEXT */
const text = `sayangg, maaff yaa.

akuu sadar akuu yangg salahh, tapii malahh akuu yangg marahh, ngomongg kasarr, bahkann makii kamuu.

maaff udahh bikinn kamuu cemburuu teruss.

maaff jugaa selamaa inii akuu masii keras kepalaa, masii ngerasaa gamauu dikekangg.

padahall harusnyaa akuu lebihh bisaa ngargain kamuu sebagaii cewekuu.

akuu tauu kataa maaff ajaa gaa bakal langsung bikin kamuu baikk lagii.

akuu benerann nyesell samaa semuaa yangg akuu lakuinn.

kaloo kamuu masii marahh akuu ngerti kokk.

akuu sayanggg bangett samaa kamuu.

akuu gamauu kehilangan kamuu garaa garaa egoo samaa mulutt akuu sendirii.

maaff yaa sayanggg. 🤍`;

/* TYPEWRITER */
function type(el, i=0){
  if(i < text.length){
    el.innerHTML += text[i];
    setTimeout(()=>type(el,i+1),15);
  }
}

/* OPEN LETTER */
function openLetter(){
  const el = document.getElementById("letter");
  if(el.style.display==="block") return;
  el.style.display="block";
  type(el);
}

/* MUSIC */
const music = document.getElementById("music");
let playing = false;

function toggleMusic(){
  if(!playing){
    music.volume = 0.7;
    music.play();
    playing = true;
  }else{
    music.pause();
    playing = false;
  }
}

/* AUTO PLAY ON CLICK */
document.addEventListener("click",()=>{
  music.play().catch(()=>{});
},{once:true});

/* LOVE EXPLOSION */
function love(){
  for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="explode";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.top="60vh";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* STARS */
const stars=document.getElementById("stars");
for(let i=0;i<80;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"vw";
  s.style.top=Math.random()*100+"vh";
  s.style.animationDuration=(Math.random()*3+1)+"s";
  stars.appendChild(s);
}

/* HEARTS */
const hearts=document.getElementById("hearts");
for(let i=0;i<20;i++){
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(Math.random()*5+3)+"s";
  hearts.appendChild(h);
}

/* SAKURA */
const sakura=document.getElementById("sakura");
for(let i=0;i<25;i++){
  let s=document.createElement("div");
  s.className="sakura";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*5+5)+"s";
  sakura.appendChild(s);
}

</script>

</body>
</html>
